name: Debug JaCoCo Build (artifact)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Debug job context
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"
          echo "Ref: $GITHUB_REF"
          env | sort

      - name: Build and run tests (generate JaCoCo)
        run: mvn -B verify

      - name: Upload JaCoCo artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-site
          path: target/site/jacoco
