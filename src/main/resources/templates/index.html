<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anonyvote — Demo</title>
    <link rel="stylesheet" th:href="@{/style.css}" />
    <script
            src="https://code.jquery.com/jquery-3.4.1.js"
            integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU="
            crossorigin="anonymous"></script>
</head>
<body>
<main class="container">
    <div id="flash" style="display:none; padding:8px; margin-bottom:12px; border-radius:4px;
                background: #e6ffed; color: #084b22; box-shadow: 0 1px 2px rgba(0,0,0,0.04);"></div>
    <header class="site-header">
        <h1>Anonyvote — Demo</h1>
        <p class="lead">Create and browse anonymous polls (demo).</p>
    </header>

    <section class="controls">
        <button id="toggleCreateBtn" class="btn">Create a Poll</button>
    </section>

    <section id="create-poll-section" class="create" style="display:none; margin-top:16px;">
        <h2>Create a Poll</h2>
        <form id="createForm" method="post" action="/create" class="form-card">
            <div>
                <label>Question:<br>
                    <input type="text" name="question" style="width: 400px;" required>
                </label>
            </div>
            <div id="optionsContainer">
                <div class="option-row">
                    <label>Option 1: <input type="text" name="option" required></label>
                    <button type="button" class="remove-btn" style="display:none;">Remove</button>
                </div>
                <div class="option-row">
                    <label>Option 2: <input type="text" name="option" required></label>
                    <button type="button" class="remove-btn" style="display:none;">Remove</button>
                </div>
                <div class="option-row">
                    <label>Option 3: <input type="text" name="option"></label>
                    <button type="button" class="remove-btn">Remove</button>
                </div>
                <div class="option-row">
                    <label>Option 4: <input type="text" name="option"></label>
                    <button type="button" class="remove-btn">Remove</button>
                </div>
                <div class="option-row">
                    <label>Option 5: <input type="text" name="option"></label>
                    <button type="button" class="remove-btn">Remove</button>
                </div>
                <div class="option-row">
                    <label>Option 6: <input type="text" name="option"></label>
                    <button type="button" class="remove-btn">Remove</button>
                </div>
            </div>
            <div style="margin-top:8px;">
                <button type="button" id="addOptionBtn">+ Add option</button>
            </div>
            <div style="margin-top: 12px;">
                <button type="submit">Create Poll</button>
                <a href="#" id="cancelCreate">Cancel</a>
            </div>
            <p style="font-size: 0.9em; color: #666">Note: Poll results are hidden for 24 hours after creation.</p>
        </form>
    </section>

    <section class="polls">
        <h2>Recent polls</h2>
        <div>
            <div th:if="${polls.size()} == 0">No polls yet</div>
            <div th:each="poll : ${polls}" class="poll form-card">
                <h3 th:text="${poll.question}"></h3>
                <div>Created: <span th:text="${poll.createdAt}"></span></div>
                <div th:switch="${T(java.time.Instant).now().isAfter(poll.resultsVisibleAt)}">
                    <div th:case="true">Status: RESULTS_VISIBLE</div>
                    <div th:case="false">Status: RESULTS_PENDING</div>
                </div>
                <p><a th:href="@{/poll/{id}(id=${poll.id})}">View</a></p>
            </div>
        </div>
    </section>

    <footer class="site-footer">Generated demo UI — not for production use.</footer>
</main>
<script>
    // Toggle visibility of embedded create poll section
    (function () {
        var toggleBtn = document.getElementById('toggleCreateBtn');
        var section = document.getElementById('create-poll-section');
        var cancel = document.getElementById('cancelCreate');
        if (toggleBtn && section) {
            toggleBtn.addEventListener('click', function () {
                section.style.display = (section.style.display === 'none' || section.style.display === '') ? 'block' : 'none';
                if (section.style.display === 'block') {
                    // scroll into view for convenience
                    section.scrollIntoView({behavior: 'smooth'});
                }
            });
        }
        if (cancel && section) {
            cancel.addEventListener('click', function (e) {
                e.preventDefault();
                section.style.display = 'none';
            });
        }

        // --- embed the create.html option-management logic here ---
        var form = document.getElementById('createForm');
        var optionsContainer = document.getElementById('optionsContainer');
        var addBtn = document.getElementById('addOptionBtn');
        var MAX = 6;
        var MIN = 2;

        function refreshRemoveButtons() {
            var rows = optionsContainer.querySelectorAll('.option-row');
            rows.forEach(function (row, idx) {
                var btn = row.querySelector('.remove-btn');
                if (btn) {
                    if (idx < MIN) {
                        btn.style.display = 'none';
                    } else {
                        btn.style.display = '';
                    }
                }
            });
            if (addBtn) addBtn.disabled = optionsContainer.querySelectorAll('.option-row').length >= MAX;
        }

        function createOptionRow() {
            var div = document.createElement('div');
            div.className = 'option-row';
            var label = document.createElement('label');
            var count = optionsContainer.querySelectorAll('.option-row').length + 1;
            label.innerHTML = 'Option ' + count + ': ';
            var input = document.createElement('input');
            input.type = 'text';
            input.name = 'option';
            label.appendChild(input);
            var remove = document.createElement('button');
            remove.type = 'button';
            remove.className = 'remove-btn';
            remove.textContent = 'Remove';
            remove.addEventListener('click', function () {
                if (optionsContainer.querySelectorAll('.option-row').length > MIN) {
                    div.parentNode.removeChild(div);
                    refreshLabels();
                    refreshRemoveButtons();
                }
            });
            div.appendChild(label);
            div.appendChild(remove);
            return div;
        }

        function refreshLabels() {
            var rows = optionsContainer.querySelectorAll('.option-row');
            rows.forEach(function (row, idx) {
                var lbl = row.querySelector('label');
                if (lbl) {
                    var input = row.querySelector('input[name="option"]');
                    lbl.textContent = 'Option ' + (idx + 1) + ': ';
                    if (input) lbl.appendChild(input);
                }
            });
        }

        // wire existing remove buttons
        if (optionsContainer) {
            optionsContainer.querySelectorAll('.remove-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var row = btn.closest('.option-row');
                    if (!row) return;
                    if (optionsContainer.querySelectorAll('.option-row').length > MIN) {
                        row.parentNode.removeChild(row);
                        refreshLabels();
                        refreshRemoveButtons();
                    }
                });
            });
        }

        if (addBtn) {
            addBtn.addEventListener('click', function () {
                if (optionsContainer.querySelectorAll('.option-row').length >= MAX) return;
                var newRow = createOptionRow();
                optionsContainer.appendChild(newRow);
                refreshLabels();
                refreshRemoveButtons();
            });
        }

        if (form) {
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var options = Array.prototype.slice.call(form.querySelectorAll('input[name="option"]'));
                options.forEach(function (inp) {
                    if (typeof inp.value === 'string') inp.value = inp.value.trim();
                });
                Array.prototype.slice.call(optionsContainer.querySelectorAll('.option-row')).forEach(function (row) {
                    var inp = row.querySelector('input[name="option"]');
                    if (!inp || inp.value === '') {
                        row.parentNode.removeChild(row);
                    }
                });

                // Build form data and submit via fetch so we can update the polls list inline.
                var fd = new FormData(form);
                // fetch will follow redirects but we care about a successful response
                fetch(form.action || '/create', {
                    method: 'POST',
                    body: fd,
                    credentials: 'same-origin'
                }).then(function (resp) {
                    if (!resp.ok && resp.status !== 302 && resp.status !== 200) {
                        throw new Error('Create failed: ' + resp.status);
                    }
                    // reload the polls section by fetching the index HTML and extracting the .polls section
                    return fetch('/');
                }).then(function (resp) {
                    if (!resp.ok) throw new Error('Failed fetching updated polls');
                    return resp.text();
                }).then(function (html) {
                    try {
                        var parser = new DOMParser();
                        var doc = parser.parseFromString(html, 'text/html');
                        var newPolls = doc.querySelector('.polls');
                        var curPolls = document.querySelector('.polls');
                        if (newPolls && curPolls) {
                            curPolls.innerHTML = newPolls.innerHTML;
                            // show a brief success message
                            var flash = document.getElementById('flash');
                            if (flash) {
                                flash.textContent = 'Poll created.';
                                flash.style.display = 'block';
                                setTimeout(function () { flash.style.display = 'none'; }, 3500);
                            }
                        } else {
                            // fallback: reload the page
                            window.location.reload();
                        }
                        // hide the create section after success and reset form
                        if (section) section.style.display = 'none';
                        // reset form inputs back to initial two empty options
                        try {
                            var q = form.querySelector('input[name="question"]');
                            if (q) q.value = '';
                            // remove all option rows except first two
                            var rows = Array.prototype.slice.call(optionsContainer.querySelectorAll('.option-row'));
                            rows.forEach(function (row, idx) {
                                var inp = row.querySelector('input[name="option"]');
                                if (idx < 2) {
                                    if (inp) inp.value = '';
                                } else {
                                    row.parentNode.removeChild(row);
                                }
                            });
                            refreshLabels();
                            refreshRemoveButtons();
                        } catch (err) {
                            // ignore reset errors
                        }
                    } catch (err) {
                        console.error(err);
                        window.location.reload();
                    }
                }).catch(function (err) {
                    console.error(err);
                    alert('Error creating poll. See console for details.');
                });
            });
        }

        // initial state
        if (optionsContainer) refreshRemoveButtons();
    })();
</script>
</body>
</html>
