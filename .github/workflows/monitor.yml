name: CI / scheduled-monitor

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes — change as needed
  workflow_dispatch:
    inputs:
      url:
        description: 'Optional URL to check. If not provided, uses the DEPLOY_URL secret.'
        required: false
        default: ''

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make health script executable
        run: chmod +x scripts/health_check.sh || true

      - name: Run health check and collect logs
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          API_TOKEN: ${{ secrets.DEPLOY_API_TOKEN }}
        run: |
          set -euo pipefail
          # Determine URL: prefer workflow input, then secret
          URL="${{ github.event.inputs.url }}"
          if [ -z "$URL" ]; then
            URL="${DEPLOY_URL:-}"
          fi
          if [ -z "$URL" ]; then
            echo "No URL provided via workflow input or DEPLOY_URL secret. Exiting with failure." >&2
            exit 1
          fi
          echo "Using URL: $URL"

          # Run health check but don't fail the step immediately so we can upload logs
          if ./scripts/health_check.sh "$URL"; then
            RC=0
          else
            RC=$?
          fi

          echo "Health check exit code: $RC"
          mkdir -p logs
          echo "$RC" > logs/exit_code.txt
          echo "$URL" > logs/url.txt
          ls -la logs || true

      - name: Upload logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: logs/**

      - name: Create GitHub issue on failure (deduplicated)
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let rc = '0';
            try {
              rc = fs.readFileSync('logs/exit_code.txt','utf8').trim();
            } catch (e) {
              rc = '0';
            }
            if (rc === '0') {
              console.log('Health check passed; no issue created.');
              return;
            }

            let url = 'unspecified';
            try { url = fs.readFileSync('logs/url.txt','utf8').trim(); } catch(e) { /* ignore */ }

            const labelName = 'monitor-failure';

            // Ensure label exists (create if missing)
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: labelName });
            } catch (e) {
              // create label
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: labelName, color: 'b60205', description: 'Open monitor failures' });
            }

            // Check for an existing open issue with the label that references this URL
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: labelName, per_page: 100 });
            const exists = (issues.data || []).some(i => (i.body || '').includes(url));
            if (exists) {
              console.log(`An open monitor issue already exists for URL: ${url}. Skipping creation.`);
              return;
            }

            const title = `Monitor: health check failed for ${url}`;
            const body = `Health check returned exit code **${rc}** for URL: **${url}**\n\n` +
              `Run details: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}\n\n` +
              `Artifact name: monitor-logs-${process.env.GITHUB_RUN_ID}`;

            const issue = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: [labelName] });
            console.log(`Created issue #${issue.data.number}`);
