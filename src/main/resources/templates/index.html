<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anonyvote — Demo</title>
    <link rel="stylesheet" th:href="@{/style.css}" />
    <script
            src="https://code.jquery.com/jquery-3.4.1.js"
            integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU="
            crossorigin="anonymous"></script>
</head>
<body>
<main class="container">
    <header class="site-header">
        <h1>Anonyvote — Demo</h1>
        <p class="lead">Quick UI to create Person objects and view polls (demo).</p>
    </header>

    <section class="controls">
        <form class="inline-form" action="/person-controller/read-all" method="get">
            <button class="btn" type="submit">Read All Persons</button>
        </form>

        <form class="inline-form" action="/person-controller/create-default" method="post">
            <button class="btn btn-secondary" type="submit">Create Default Person</button>
        </form>
    </section>

    <section class="create">
        <h2>Create Person</h2>
        <form id="create-person-form" class="form-card" onsubmit="create(event)">
            <label class="form-row">First Name:
                <input id="fname" class="text-input" name="firstName" autocomplete="given-name">
            </label>
            <label class="form-row">Last Name:
                <input id="lname" class="text-input" name="lastName" autocomplete="family-name">
            </label>
            <div class="form-row">
                <button class="btn btn-primary" type="submit">Create Person</button>
            </div>
        </form>
        <div id="create-result" class="form-row" aria-live="polite" style="margin-top:10px;color:var(--muted);"></div>
    </section>

    <section class="polls">
        <h2>Recent polls</h2>
        <div>
            <div th:if="${polls.size()} == 0">No polls yet</div>
            <div th:each="poll : ${polls}" class="poll form-card">
                <h3 th:text="${poll.question}"></h3>
                <div>Created: <span th:text="${poll.createdAt}"></span></div>
                <div th:switch="${T(java.time.Instant).now().isAfter(poll.resultsVisibleAt)}">
                    <div th:case="true">Status: RESULTS_VISIBLE</div>
                    <div th:case="false">Status: RESULTS_PENDING</div>
                </div>
                <p><a th:href="@{/poll/{id}(id=${poll.id})}">View</a></p>
            </div>
        </div>
    </section>

    <footer class="site-footer">Generated demo UI — not for production use.</footer>
</main>

<script>
    class Person {
        constructor(id_, fname_, lname_) {
            this.id = id_;
            this.firstName = fname_;
            this.lastName = lname_;
        }
    }

    function create(e) {
        e.preventDefault();
        const firstName1 = document.getElementById("fname").value.trim();
        const lastName1 = document.getElementById("lname").value.trim();
        const jsonPerson1 = new Person(0, firstName1, lastName1);
        const personData = JSON.stringify(jsonPerson1);

        $.ajax({
            type: "POST",
            crossDomain: true,
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
                'Access-Control-Allow-Origin': '*'
            },
            url: "/person-controller/create",
            data: personData,
            dataType: "json",
            success: function (response) {
                // show created person inline instead of using alert
                const target = document.getElementById('create-result');
                if (response && response.id !== undefined) {
                    target.innerText = `Created Person: id=${response.id} — ${response.firstName} ${response.lastName}`;
                } else {
                    target.innerText = 'Created person (response): ' + JSON.stringify(response);
                }
                // clear inputs for next create
                document.getElementById('fname').value = '';
                document.getElementById('lname').value = '';
            },
            error: function () {
                const targetErr = document.getElementById('create-result');
                targetErr.innerText = 'Error while creating person';
            }
        });

    }
</script>
</body>
</html>
