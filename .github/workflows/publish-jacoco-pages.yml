name: Publish JaCoCo site to GitHub Pages

# Builds the project, generates the JaCoCo site, and deploys the generated
# HTML to GitHub Pages using the official Pages actions.

on:
  workflow_dispatch: {}
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Build and run tests (generate JaCoCo site)
        run: mvn -B verify

      - name: Upload JaCoCo site for Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: target/site/jacoco

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
